<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실기 작업형 출제현황 — 153LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0eeff;--bg2:#ffffff;--bg3:#ede8ff;
  --border:#d4caf5;--border2:#e8e3f8;
  --text:#1e1040;--text2:#4a3f72;--text3:#8b80b0;
  --accent:#6c4fe3;--accent2:#5438c4;--accent-bg:#ede8ff;--accent-light:#a78bfa;
  --hfrom:#5b4fcf;--hto:#9b59d0;
  --green:#059669;--green-bg:#d1fae5;
  --red:#dc2626;--gold:#b45309;--silver:#6b7280;--bronze:#92400e;
  --shadow:0 2px 8px rgba(108,79,227,.10),0 4px 20px rgba(108,79,227,.07);
  --shadow-sm:0 1px 4px rgba(108,79,227,.08);
  --r:12px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Pretendard','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;min-height:100vh;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:var(--accent-light);border-radius:3px;}

/* 헤더 */
header{background:linear-gradient(135deg,var(--hfrom),var(--hto));padding:26px 24px 20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(91,79,207,.30);}
.hinner{max-width:1060px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;}
.h-eye{font-size:11px;letter-spacing:3px;color:#d8c8ff;margin-bottom:4px;text-transform:uppercase;font-weight:600;}
header h1{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px;}
.h-meta{font-size:12px;color:#c4b0f0;margin-top:3px;}
.h-stats{display:flex;gap:12px;}
.hstat{text-align:center;background:rgba(255,255,255,.15);border-radius:10px;padding:8px 16px;border:1px solid rgba(255,255,255,.25);}
.hstat-val{font-size:22px;font-weight:800;color:#fff;display:block;}
.hstat-label{font-size:11px;color:#d8c8ff;letter-spacing:1px;}

/* 종목 탭바 */
.exam-bar{background:var(--accent2);position:sticky;top:82px;z-index:99;}
.exam-inner{max-width:1060px;margin:0 auto;display:flex;padding:0 24px;gap:2px;}
.exam-btn{padding:11px 20px;font-size:14px;font-weight:600;font-family:'Pretendard',sans-serif;background:transparent;color:rgba(255,255,255,.65);border:none;border-bottom:3px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.exam-btn:hover{color:#fff;}
.exam-btn.active{color:#fff;border-bottom-color:#fff;font-weight:700;}

/* 뷰 탭바 */
.view-bar{background:var(--bg2);border-bottom:2px solid var(--border);position:sticky;top:128px;z-index:98;box-shadow:0 2px 8px rgba(108,79,227,.06);}
.view-inner{max-width:1060px;margin:0 auto;display:flex;padding:0 24px;gap:2px;}
.view-btn{padding:12px 22px;font-size:15px;font-weight:500;font-family:'Pretendard',sans-serif;background:transparent;color:var(--text3);border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.view-btn:hover{color:var(--accent);background:var(--accent-bg);}
.view-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}

/* 메인 */
main{max-width:1060px;margin:0 auto;padding:26px 24px 60px;}
.view-panel{display:none;}
.view-panel.active{display:block;}

/* 연도 그룹 */
.year-group{margin-bottom:32px;}
.year-group-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.year-group-title{font-size:22px;font-weight:800;color:var(--accent2);}
.year-group-line{flex:1;height:2px;background:var(--border);}
.year-group-count{font-size:13px;color:var(--text3);font-weight:500;}

/* 회차 섹션 */
.round-section{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);}
.round-head{padding:12px 20px;background:linear-gradient(135deg,var(--hfrom),var(--hto));display:flex;justify-content:space-between;align-items:center;}
.round-title{font-size:16px;font-weight:700;color:#fff;}
.round-count{font-size:13px;color:#d8c8ff;font-weight:500;}
.round-body{padding:16px 18px;background:var(--bg2);}
.seq-label{font-size:13px;font-weight:700;color:var(--text3);margin-bottom:10px;padding-left:2px;}

/* A/B 카드 */
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.ab-card{background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm);}
.ab-head{padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.ab-head-a{background:linear-gradient(135deg,#ede8ff,#ddd6fe);}
.ab-head-b{background:linear-gradient(135deg,#d1fae5,#a7f3d0);}
.ab-label{font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;}
.ab-label-a{background:var(--accent);color:#fff;}
.ab-label-b{background:var(--green);color:#fff;}
.ab-subject{font-size:16px;font-weight:700;color:var(--text);}
.ab-body{padding:12px 16px;}
.ab-parts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.ab-part{font-size:13px;padding:3px 11px;background:var(--bg3);color:var(--text2);border-radius:20px;border:1px solid var(--border);font-weight:500;}
.ab-img-wrap{width:100%;aspect-ratio:400/280;background:var(--bg3);border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:all .15s;}
.ab-img-wrap:hover{opacity:.88;box-shadow:0 4px 12px rgba(108,79,227,.15);}
.ab-img-wrap img{width:100%;height:100%;object-fit:cover;}
.ab-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);}
.ab-memo{font-size:13px;color:var(--text2);margin-top:10px;padding:8px 12px;background:var(--accent-bg);border-radius:var(--r-sm);border-left:3px solid var(--accent);}

/* 단일 과제 */
.single-list{display:flex;flex-direction:column;gap:8px;}
.single-item{display:flex;align-items:center;gap:14px;padding:11px 16px;background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border2);transition:all .12s;}
.single-item:hover{background:var(--accent-bg);border-color:var(--border);transform:translateX(3px);}
.single-num{font-size:13px;color:var(--text3);min-width:24px;text-align:center;font-weight:700;}
.single-subject{font-size:15px;font-weight:600;min-width:140px;}
.single-parts{font-size:14px;color:var(--text2);flex:1;}

/* 통계 */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px;}
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--hfrom),var(--hto));}
.summary-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase;font-weight:600;}
.summary-val{font-size:26px;font-weight:800;color:var(--accent2);}
.summary-sub{font-size:13px;color:var(--text3);margin-top:4px;}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow-sm);}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--accent-bg);}
.card-title{font-size:13px;font-weight:700;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;}
.card-sub{font-size:13px;color:var(--text3);}

.bar-list{padding:18px 20px;}
.bar-row{margin-bottom:13px;}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:5px;font-size:15px;}
.bar-left{display:flex;align-items:center;gap:10px;}
.bar-rank{display:inline-block;width:26px;text-align:center;font-size:13px;font-weight:800;}
.rank-1{color:var(--gold);}.rank-2{color:var(--silver);}.rank-3{color:var(--bronze);}.rank-n{color:var(--text3);}
.bar-name{color:var(--text);font-weight:500;}.bar-name.bold{font-weight:700;}
.bar-count{color:var(--accent);font-weight:800;}
.bar-track{height:9px;background:var(--bg3);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .7s ease;}
.fill-gold{background:linear-gradient(90deg,#f59e0b,#d97706);}
.fill-silver{background:linear-gradient(90deg,#9ca3af,#6b7280);}
.fill-bronze{background:linear-gradient(90deg,#d97706,#b45309);}
.fill-blue{background:linear-gradient(90deg,var(--hfrom),var(--hto));}
.fill-blue2{background:linear-gradient(90deg,#8b5cf6,#a78bfa);}
.fill-dim{background:#c4b5fd;}

table{width:100%;border-collapse:collapse;font-size:15px;}
thead tr{background:var(--accent-bg);}
th{padding:11px 18px;text-align:left;color:var(--accent2);font-size:13px;font-weight:700;border-bottom:2px solid var(--border);}
td{padding:11px 18px;border-bottom:1px solid var(--border2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--accent-bg);}

.badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;}
.badge-blue{background:var(--accent-bg);color:var(--accent2);border:1px solid #c4b5fd;}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid #6ee7b7;}
.badge-purple{background:#faf5ff;color:#7c3aed;border:1px solid #ddd6fe;}
.badge-yellow{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}

/* 검색 */
.search-wrap{margin-bottom:22px;position:relative;}
.search-input{width:100%;padding:14px 20px 14px 48px;background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);color:var(--text);font-size:16px;font-family:'Pretendard',sans-serif;outline:none;transition:all .15s;box-shadow:var(--shadow-sm);}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(108,79,227,.12);}
.search-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:17px;pointer-events:none;}
.s-result{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm);margin-bottom:12px;}
.s-result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.s-result-name{font-size:17px;font-weight:700;}
.s-result-count{font-size:15px;font-weight:800;color:var(--accent);}
.s-tag{font-size:13px;padding:4px 13px;background:var(--bg3);color:var(--text2);border-radius:20px;border:1px solid var(--border);font-weight:500;display:inline-block;margin:3px;}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,16,64,.7);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);max-width:860px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 48px rgba(108,79,227,.25);}
.modal-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--accent-bg);}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:18px;padding:5px 10px;border-radius:8px;font-family:'Pretendard',sans-serif;}
.modal-close:hover{background:var(--red);border-color:var(--red);color:#fff;}
.modal-body{flex:1;overflow:auto;padding:20px;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.modal-body img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:var(--r-sm);}

.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:15px;}
.empty span{display:block;font-size:13px;margin-top:8px;}

@media(max-width:640px){
  header{padding:16px;} .h-stats{gap:8px;} .hstat{padding:6px 10px;} .hstat-val{font-size:18px;}
  main{padding:16px 14px 40px;} header h1{font-size:20px;}
  .summary-grid{grid-template-columns:1fr 1fr;} .ab-grid{grid-template-columns:1fr;}
  .exam-inner,.view-inner{padding:0 8px;}
  .exam-btn,.view-btn{padding:10px 12px;font-size:13px;}
  .view-bar{top:112px;}
}
</style>
</head>
<body>

<header>
  <div class="hinner">
    <div>
      <div class="h-eye">실기 작업형 출제현황</div>
      <h1 id="headerTitle">일반기계기사</h1>
      <div class="h-meta" id="headerMeta">데이터 로딩 중...</div>
    </div>
    <div class="h-stats">
      <div class="hstat"><span class="hstat-val" id="hTotal">—</span><span class="hstat-label">총 출제</span></div>
      <div class="hstat"><span class="hstat-val" id="hYears">—</span><span class="hstat-label">연도</span></div>
      <div class="hstat"><span class="hstat-val" id="hSubjects">—</span><span class="hstat-label">품목</span></div>
    </div>
  </div>
</header>

<!-- 종목 탭바 -->
<div class="exam-bar">
  <div class="exam-inner">
    <button class="exam-btn active" onclick="switchExam('meche',this)">일반기계기사</button>
    <button class="exam-btn" onclick="switchExam('design',this)">기계설계산업기사</button>
    <button class="exam-btn" onclick="switchExam('cad',this)">전산응용기계제도기능사</button>
  </div>
</div>

<!-- 뷰 탭바 -->
<div class="view-bar">
  <div class="view-inner">
    <button class="view-btn active" onclick="switchView('list',this)">📋 출제현황</button>
    <button class="view-btn" onclick="switchView('stats',this)">📊 빈도 통계</button>
    <button class="view-btn" onclick="switchView('search',this)">🔍 과제 검색</button>
  </div>
</div>

<main>
  <div id="view-list" class="view-panel active"><div id="listContent"></div></div>
  <div id="view-stats" class="view-panel">
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="card">
      <div class="card-head"><span class="card-title">출제빈도 순위</span><span class="card-sub" id="topSubCount"></span></div>
      <div class="bar-list" id="barList"></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">전체 품목 순위표</span></div>
      <div style="overflow-x:auto">
        <table><thead><tr><th>순위</th><th>작품명</th><th>출제횟수</th><th>비율</th></tr></thead><tbody id="rankTable"></tbody></table>
      </div>
    </div>
  </div>
  <div id="view-search" class="view-panel">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="작품명을 입력하세요 (예: 드릴지그, 클램프…)" oninput="doSearch(this.value)">
    </div>
    <div id="searchResults"></div>
  </div>
</main>

<div class="modal-overlay" id="imgModal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">도면</span>
      <button class="modal-close" onclick="document.getElementById('imgModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body"><img id="modalImg" src="" alt="도면"></div>
  </div>
</div>

<script>
let DATA = {records:[],ab_records:[],exam_records:{}};
let currentExam = 'meche';

const EXAM_LABELS = {meche:'일반기계기사',design:'기계설계산업기사',cad:'전산응용기계제도기능사'};

async function loadData() {
  try { const r = await fetch('data.json'); DATA = await r.json(); } catch(e) {}
  renderAll();
}

function getAb() {
  if (currentExam !== 'meche' && DATA.exam_records?.[currentExam]) return DATA.exam_records[currentExam];
  if (currentExam === 'meche') return DATA.ab_records || [];
  return [];
}
function getSingle() {
  return currentExam === 'meche' ? (DATA.records || []) : [];
}
function getFreq() {
  const f = {};
  getSingle().forEach(r => { f[r.subject]=(f[r.subject]||0)+1; });
  getAb().forEach(r => {
    if(r.a_subject) f[r.a_subject]=(f[r.a_subject]||0)+1;
    if(r.b_subject) f[r.b_subject]=(f[r.b_subject]||0)+1;
  });
  return Object.entries(f).sort((a,b)=>b[1]-a[1]).map(([s,c],i)=>({rank:i+1,subject:s,count:c}));
}

function renderAll() {
  updateHeader();
  buildList();
  buildStats();
  const si = document.getElementById('searchInput');
  if(si){si.value='';document.getElementById('searchResults').innerHTML='';}
}

function updateHeader() {
  const ab=getAb(), s=getSingle();
  const total=ab.length*2+s.length;
  const years=new Set([...ab.map(r=>r.year),...s.map(r=>r.year)]);
  const freq=getFreq();
  document.getElementById('headerTitle').textContent=EXAM_LABELS[currentExam];
  document.getElementById('hTotal').textContent=total+'건';
  document.getElementById('hYears').textContent=years.size+'개';
  document.getElementById('hSubjects').textContent=freq.length+'종';
  document.getElementById('headerMeta').textContent=
    `최종 업데이트: ${DATA.meta?.updated||'—'} · 2023년까지 단일과제 / 2024년~ 동력·치공구 이중과제`;
}

function buildList() {
  const ab=getAb(), single=getSingle();
  const years=[...new Set([...ab.map(r=>r.year),...single.map(r=>r.year)])].sort((a,b)=>b-a);

  if(!years.length){
    document.getElementById('listContent').innerHTML=
      `<div class="empty">${EXAM_LABELS[currentExam]} 출제 데이터가 없습니다.<span>admin.html에서 데이터를 입력해 주세요.</span></div>`;
    return;
  }

  let html='';
  years.forEach(year=>{
    const yAb=ab.filter(r=>r.year===year);
    const yS=single.filter(r=>r.year===year);
    const total=yAb.length*2+yS.length;

    html+=`<div class="year-group">
      <div class="year-group-head">
        <div class="year-group-title">${year}년</div>
        <div class="year-group-line"></div>
        <div class="year-group-count">${total}문항</div>
      </div>`;

    // 회차 역순
    const rounds=[...new Set([...yAb.map(r=>r.round),...yS.map(r=>r.round)])].sort((a,b)=>b-a);
    rounds.forEach(rn=>{
      const rnAb=yAb.filter(r=>r.round===rn).sort((a,b)=>(a.seq||0)-(b.seq||0));
      const rnS=yS.filter(r=>r.round===rn);
      const rnTotal=rnAb.length*2+rnS.length;

      html+=`<div class="round-section">
        <div class="round-head">
          <span class="round-title">${year}년 ${rn}회</span>
          <span class="round-count">${rnAb.length?rnAb.length+'일차 · ':''}${rnTotal}문항</span>
        </div>
        <div class="round-body">`;

      if(rnAb.length){
        rnAb.forEach(item=>{
          const ap=(item.a_parts||[]).map(p=>`<span class="ab-part">${p}</span>`).join('');
          const bp=(item.b_parts||[]).map(p=>`<span class="ab-part">${p}</span>`).join('');
          const ai=item.a_image?`<img src="${item.a_image}" alt="${item.a_subject}" onclick="openModal('${item.a_subject} 도면','${item.a_image}')">`:`<div class="ab-img-placeholder">도면 없음</div>`;
          const bi=item.b_image?`<img src="${item.b_image}" alt="${item.b_subject}" onclick="openModal('${item.b_subject} 도면','${item.b_image}')">`:`<div class="ab-img-placeholder">도면 없음</div>`;
          html+=`<div style="margin-bottom:16px">
            ${item.seq?`<div class="seq-label">── ${item.seq}일차</div>`:''}
            <div class="ab-grid">
              <div class="ab-card">
                <div class="ab-head ab-head-a"><span class="ab-label ab-label-a">동력</span><span class="ab-subject">${item.a_subject||'—'}</span></div>
                <div class="ab-body">
                  <div class="ab-parts">${ap||'<span style="color:var(--text3);font-size:13px">부품 정보 없음</span>'}</div>
                  <div class="ab-img-wrap">${ai}</div>
                  ${item.a_memo?`<div class="ab-memo">${item.a_memo}</div>`:''}
                </div>
              </div>
              <div class="ab-card">
                <div class="ab-head ab-head-b"><span class="ab-label ab-label-b">치공구</span><span class="ab-subject">${item.b_subject||'—'}</span></div>
                <div class="ab-body">
                  <div class="ab-parts">${bp||'<span style="color:var(--text3);font-size:13px">부품 정보 없음</span>'}</div>
                  <div class="ab-img-wrap">${bi}</div>
                  ${item.b_memo?`<div class="ab-memo">${item.b_memo}</div>`:''}
                </div>
              </div>
            </div>
          </div>`;
        });
      }

      if(rnS.length){
        html+=`<div class="single-list">`;
        rnS.forEach((item,i)=>{
          html+=`<div class="single-item">
            <span class="single-num">${i+1}</span>
            <span class="badge ${badgeFor(item.subject)}">${item.subject}</span>
            ${item.parts?.length?`<span class="single-parts">${item.parts.join(', ')}</span>`:''}
          </div>`;
        });
        html+=`</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('listContent').innerHTML=html;
}

function buildStats(){
  const freq=getFreq();
  const total=getAb().length*2+getSingle().length;
  const maxC=freq[0]?.count||1;

  document.getElementById('summaryGrid').innerHTML=[
    {label:'총 출제 기록',val:total+'건',sub:''},
    {label:'최다 출제',val:freq[0]?.subject||'—',sub:(freq[0]?.count||0)+'회 출제'},
    {label:'등록 품목 수',val:freq.length+'종',sub:'전체 기간'},
  ].map(c=>`<div class="summary-card"><div class="summary-label">${c.label}</div><div class="summary-val">${c.val}</div>${c.sub?`<div class="summary-sub">${c.sub}</div>`:''}</div>`).join('');

  document.getElementById('topSubCount').textContent='전체 '+freq.length+'종';

  document.getElementById('barList').innerHTML=freq.slice(0,20).map((d,i)=>{
    const fc=i===0?'fill-gold':i===1?'fill-silver':i===2?'fill-bronze':i<5?'fill-blue':i<10?'fill-blue2':'fill-dim';
    const rc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    return `<div class="bar-row"><div class="bar-meta"><div class="bar-left"><span class="bar-rank ${rc}">${d.rank}</span><span class="bar-name ${i<3?'bold':''}">${d.subject}</span></div><span class="bar-count">${d.count}회</span></div><div class="bar-track"><div class="bar-fill ${fc}" style="width:${(d.count/maxC*100).toFixed(1)}%"></div></div></div>`;
  }).join('');

  document.getElementById('rankTable').innerHTML=freq.map((d,i)=>{
    const pct=total?((d.count/total)*100).toFixed(1):'0.0';
    const rc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    return `<tr><td><span class="bar-rank ${rc}" style="font-size:14px">${d.rank}</span></td><td><span class="badge ${badgeFor(d.subject)}">${d.subject}</span></td><td style="font-weight:700">${d.count}회</td><td style="color:var(--text3)">${pct}%</td></tr>`;
  }).join('');
}

function doSearch(q){
  const c=document.getElementById('searchResults');
  q=q.trim();
  if(!q){c.innerHTML='';return;}
  const f={},o={};
  getSingle().forEach(r=>{
    if(r.subject.includes(q)){f[r.subject]=(f[r.subject]||0)+1;(o[r.subject]=o[r.subject]||[]).push(`${r.year}년 ${r.round}회`);}
  });
  getAb().forEach(r=>{
    [['a_subject','동력'],['b_subject','치공구']].forEach(([k,l])=>{
      const s=r[k];
      if(s&&s.includes(q)){f[s]=(f[s]||0)+1;(o[s]=o[s]||[]).push(`${r.year}년 ${r.round}회${r.seq?' '+r.seq+'일차':''} [${l}]`);}
    });
  });
  const res=Object.entries(f).sort((a,b)=>b[1]-a[1]);
  if(!res.length){c.innerHTML=`<div class="empty">검색 결과가 없습니다.</div>`;return;}
  c.innerHTML=res.map(([s,cnt])=>`
    <div class="s-result">
      <div class="s-result-head">
        <div class="s-result-name"><span class="badge ${badgeFor(s)}" style="margin-right:10px">${s}</span></div>
        <span class="s-result-count">총 ${cnt}회 출제</span>
      </div>
      <div>${(o[s]||[]).map(t=>`<span class="s-tag">${t}</span>`).join('')}</div>
    </div>`).join('');
}

function switchExam(exam,btn){
  currentExam=exam;
  document.querySelectorAll('.exam-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // 출제현황 탭으로 리셋
  document.querySelectorAll('.view-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-list').classList.add('active');
  document.querySelector('.view-btn').classList.add('active');
  renderAll();
}

function switchView(name,btn){
  document.querySelectorAll('.view-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
}

function openModal(title,src){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalImg').src=src;
  document.getElementById('imgModal').classList.add('open');
}
function closeModal(e){
  if(e.target===document.getElementById('imgModal'))
    document.getElementById('imgModal').classList.remove('open');
}
function badgeFor(s){
  if(!s)return'badge-gray';
  if(s.includes('동력전달장치'))return'badge-blue';
  if(s.includes('지그'))return'badge-green';
  if(s.includes('클램프'))return'badge-purple';
  if(s.includes('바이스'))return'badge-yellow';
  return'badge-gray';
}

loadData();
